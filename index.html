<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Curriculum · Raheel Ahmad Aguirre</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #F8F6F1; --cream: #F0EDE4; --ink: #0F0F0F;
      --mid: #4A4A4A; --soft: #888; --line: #E0DDD5;
      --serif: 'EB Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --card-w: 300px; --card-h: 420px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; overflow: hidden; }
    .page { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* HEADER */
    .hdr { flex-shrink: 0; background: var(--ink); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .hdr-eye { font-size: 9px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 2px; }
    .hdr-title { font-family: var(--serif); font-size: 17px; color: #fff; }
    .hdr-stats { display: flex; gap: 20px; flex-shrink: 0; }
    .stat-v { display: block; font-family: var(--serif); font-size: 20px; font-weight: 600; color: #fff; line-height: 1; }
    .stat-l { display: block; font-size: 8.5px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.38); margin-top: 2px; }
    .back-btn { display: flex; align-items: center; gap: 5px; color: rgba(255,255,255,.4); font-size: 11px; text-decoration: none; padding: 6px 10px; border: 1px solid rgba(255,255,255,.12); border-radius: 6px; transition: all .2s; flex-shrink: 0; }
    .back-btn:hover { color: #fff; border-color: rgba(255,255,255,.3); }

    /* NAV */
    .nav-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 9px 24px; border-bottom: 1px solid var(--line); overflow-x: auto; scrollbar-width: none; }
    .nav-bar::-webkit-scrollbar { display: none; }
    .nav-sem { font-size: 9.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--soft); padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all .2s; white-space: nowrap; border: 1px solid transparent; background: none; }
    .nav-sem.active { color: var(--ink); border-color: var(--line); background: var(--cream); }

    /* STRIP */
    .strip-area { flex: 1; display: flex; align-items: center; position: relative; overflow: hidden; min-height: 0; }
    .strip-area::before, .strip-area::after { content: ''; position: absolute; top: 0; bottom: 0; width: 80px; z-index: 10; pointer-events: none; }
    .strip-area::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
    .strip-area::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }
    .strip-track { display: flex; align-items: center; gap: 20px; overflow-x: scroll; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 20px calc(50vw - var(--card-w)/2); width: 100%; height: 100%; cursor: grab; }
    .strip-track:active { cursor: grabbing; }
    .strip-track::-webkit-scrollbar { display: none; }

    /* CARDS */
    .s-card { flex: 0 0 var(--card-w); height: var(--card-h); scroll-snap-align: center; perspective: 1000px; transition: opacity .3s, transform .3s; opacity: .42; transform: scale(.88); user-select: none; -webkit-user-select: none; }
    .s-card.active { opacity: 1; transform: scale(1); }
    .s-card.active .card-front { cursor: pointer; }
    .s-card.flipped .card-inner { transform: rotateY(180deg); }
    .card-inner { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,0,.2,1); position: relative; }
    .card-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; overflow: hidden; }

    /* FRONT */
    .card-front { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.09); display: flex; flex-direction: column; }
    .card-band { height: 6px; flex-shrink: 0; }
    .card-body { flex: 1; display: flex; flex-direction: column; padding: 20px 22px 0; }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .card-badge { font-size: 9px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: #fff; padding: 3px 8px; border-radius: 20px; }
    .card-cat { font-size: 9px; font-weight: 500; color: var(--soft); text-align: right; max-width: 120px; line-height: 1.3; }
    .card-name { font-family: var(--serif); font-size: 21px; line-height: 1.3; color: var(--ink); flex: 1; display: flex; align-items: center; }
    .ring-wrap { display: flex; align-items: center; justify-content: center; padding: 14px 0 6px; position: relative; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg  { fill: none; stroke: var(--line); stroke-width: 5; }
    .ring-val { fill: none; stroke-width: 5; stroke-linecap: round; }
    .ring-txt { position: absolute; text-align: center; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .ring-num { display: block; font-family: var(--serif); font-size: 26px; font-weight: 600; line-height: 1; }
    .ring-den { display: block; font-size: 9px; color: var(--soft); letter-spacing: .08em; }
    .ring-ap  { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--soft); }
    .card-hint { border-top: 1px solid var(--line); padding: 12px 22px; display: flex; align-items: center; justify-content: center; gap: 5px; color: var(--soft); font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; }

    /* BACK */
    .card-back { background: var(--ink); transform: rotateY(180deg); display: flex; flex-direction: column; padding: 22px 22px 18px; color: #fff; }
    .back-close { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .back-close:hover { color: rgba(255,255,255,.6); }
    .back-tag  { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #fff; padding: 3px 9px; border-radius: 20px; margin-bottom: 12px; }
    .back-name { font-family: var(--serif); font-size: 18px; line-height: 1.25; color: #fff; margin-bottom: 14px; }
    .back-desc { font-size: 12.5px; line-height: 1.72; color: rgba(255,255,255,.68); flex: 1; overflow-y: auto; scrollbar-width: none; }
    .back-desc::-webkit-scrollbar { display: none; }
    .back-meta { display: flex; gap: 18px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.1); flex-shrink: 0; }
    .bm-l { font-size: 8px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.28); display: block; margin-bottom: 3px; }
    .bm-v { font-family: var(--serif); font-size: 15px; color: rgba(255,255,255,.88); }

    /* ARROWS */
    .arrow { position: absolute; top: 50%; z-index: 20; transform: translateY(-50%); width: 40px; height: 40px; background: rgba(255,255,255,.92); border: 1px solid var(--line); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,.1); transition: all .2s; -webkit-tap-highlight-color: transparent; }
    .arrow:hover { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
    #aPrev { left: 16px; } #aNext { right: 16px; }

    /* FILMSTRIP */
    .film-wrap { flex-shrink: 0; padding: 10px 24px 14px; border-top: 1px solid var(--line); background: var(--cream); }
    .film-lbl { font-size: 8.5px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--soft); margin-bottom: 8px; text-align: center; }
    .film-scroll { overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .film-scroll::-webkit-scrollbar { display: none; }
    .film-track { display: flex; gap: 3px; align-items: center; width: max-content; margin: 0 auto; padding: 4px 2px; }
    .film-chip { width: 8px; height: 24px; border-radius: 3px; cursor: pointer; transition: all .22s; opacity: .45; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .film-chip:hover { opacity: .75; transform: scaleY(1.1); }
    .film-chip.active { opacity: 1; width: 13px; height: 30px; box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px rgba(0,0,0,.18); }
    .film-div { width: 1px; height: 26px; background: var(--line); flex-shrink: 0; margin: 0 5px; }

    /* LEGEND */
    .leg-row { flex-shrink: 0; display: flex; flex-wrap: wrap; gap: 6px 14px; justify-content: center; padding: 7px 24px 10px; border-top: 1px solid var(--line); }
    .leg-i { display: flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 500; color: var(--mid); }
    .leg-d { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    @media (max-width: 500px) {
      :root { --card-w: 76vw; --card-h: 400px; }
      .hdr { padding: 10px 14px; }
      .back-btn, .arrow { display: none; }
      .strip-track { padding: 16px calc(50vw - var(--card-w)/2); }
    }
  </style>
</head>

<script>

const C = [

// stats
const graded = C.filter(c => c[2] !== null);
document.getElementById('sTot').textContent = C.length;
document.getElementById('sAvg').textContent = (graded.reduce((s,c) => s+c[2], 0) / graded.length).toFixed(1);
document.getElementById('sTop').textContent = graded.filter(c => c[2] >= 6.0).length;

// grade color (3 tiers, ponytail: inline rather than function)
const gc = g => g === null ? '#6A8E8A' : g >= 6.5 ? '#B8860B' : g >= 6.0 ? '#C8A020' : g >= 5.0 ? CAT[C.find(x=>x[2]===g)?.cat||'math'].color : '#999';

const track    = document.getElementById('track');
const filmTrack= document.getElementById('filmTrack');
const navBar   = document.getElementById('navBar');
const cards    = [], chips = [], navBtns = {};
const R = 42, circ = +(2 * Math.PI * R).toFixed(2);
let prevPeriod = '';

C.forEach((c, i) => {
  const [period, name, grade, cat, desc] = c;
  const col   = CAT[cat].color;
  const semL  = period === 'Pre' ? 'Pre' : period.replace('-', ' · S');
  const isAP  = grade === null;
  const dash  = isAP ? 0 : +((grade - 4) / 3 * circ).toFixed(2);
  const gCol  = isAP ? '#6A8E8A' : grade >= 6.5 ? '#B8860B' : grade >= 6.0 ? '#C8A020' : grade >= 5.0 ? col : '#999';

  // filmstrip divider between semesters
  if (period !== prevPeriod) {
    if (prevPeriod) filmTrack.appendChild(Object.assign(document.createElement('div'), { className:'film-div' }));
    prevPeriod = period;
  }

  // film chip
  const chip = document.createElement('div');
  chip.className = 'film-chip';
  chip.style.background = col;
  chip.title = name;
  chip.onclick = () => scrollTo(i);
  filmTrack.appendChild(chip);
  chips.push(chip);

  // card
  const card = document.createElement('div');
  card.className = 's-card';
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="card-band" style="background:${col}"></div>
        <div class="card-body">
          <div class="card-top">
            <span class="card-badge" style="background:${col}">${semL}</span>
            <span class="card-cat">${CAT[cat].label}</span>
          </div>
          <div class="card-name">${name}</div>
          <div class="ring-wrap">
            <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
              <circle class="ring-bg" cx="50" cy="50" r="${R}"/>
              <circle class="ring-val" cx="50" cy="50" r="${R}" stroke="${gCol}"
                stroke-dasharray="${circ}" stroke-dashoffset="${circ - dash}"/>
            </svg>
            <div class="ring-txt">
              ${isAP
                ? `<span class="ring-ap">AP</span>`
                : `<span class="ring-num" style="color:${gCol}">${grade.toFixed(1)}</span><span class="ring-den">/ 7.0</span>`}
            </div>
          </div>
        </div>
        <div class="card-hint">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          Tap to learn more
        </div>
      </div>
      <div class="card-face card-back">
        <div class="back-close">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </div>
        <span class="back-tag" style="background:${col}">${CAT[cat].label}</span>
        <div class="back-name">${name}</div>
        <div class="back-desc">${desc}</div>
        <div class="back-meta">
          <div><span class="bm-l">Period</span><span class="bm-v">${semL}</span></div>
          <div><span class="bm-l">Grade</span><span class="bm-v" style="color:${gCol}">${isAP ? 'AP' : grade.toFixed(1)+' / 7'}</span></div>
        </div>
      </div>
    </div>`;

  // tap vs swipe detection
  let down = null;
  card.addEventListener('pointerdown', e => { down = { x: e.clientX, y: e.clientY }; });
  card.addEventListener('pointerup', e => {
    if (!down) return;
    const moved = Math.abs(e.clientX - down.x) > 8 || Math.abs(e.clientY - down.y) > 8;
    down = null;
    if (moved) return;
    if (!card.classList.contains('active')) { scrollTo(i); return; }
    card.classList.toggle('flipped');
  });
  card.querySelector('.back-close').addEventListener('pointerup', e => { e.stopPropagation(); card.classList.remove('flipped'); });

  track.appendChild(card);
  cards.push(card);

  // nav btn (first course of each semester)
  if (!navBtns[period]) {
    const btn = document.createElement('button');
    btn.className = 'nav-sem';
    btn.textContent = semL;
    btn.onclick = () => scrollTo(i);
    navBar.appendChild(btn);
    navBtns[period] = btn;
  }
});

// active tracking
let active = -1;
function setActive(i) {
  if (i === active) return;
  if (active >= 0) { cards[active].classList.remove('active', 'flipped'); chips[active].classList.remove('active'); }
  active = i;
  cards[i].classList.add('active');
  chips[i].classList.add('active');
  chips[i].scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  Object.values(navBtns).forEach(b => b.classList.remove('active'));
  const period = C[i][0];
  if (navBtns[period]) navBtns[period].classList.add('active');
}

let t;
track.addEventListener('scroll', () => {
  clearTimeout(t);
  t = setTimeout(() => {
    const cx = track.scrollLeft + track.clientWidth / 2;
    setActive(cards.reduce((best, el, i) =>
      Math.abs(el.offsetLeft + el.offsetWidth/2 - cx) < Math.abs(cards[best].offsetLeft + cards[best].offsetWidth/2 - cx) ? i : best, 0));
  }, 50);
}, { passive:true });

function scrollTo(i) {
  track.scrollTo({ left: cards[i].offsetLeft - (track.clientWidth - cards[i].offsetWidth)/2, behavior:'smooth' });
  setTimeout(() => setActive(i), 380);
}

document.getElementById('aPrev').onclick = () => { if (active > 0) scrollTo(active-1); };
document.getElementById('aNext').onclick = () => { if (active < cards.length-1) scrollTo(active+1); };
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft' && active>0) scrollTo(active-1);
  if (e.key==='ArrowRight' && active<cards.length-1) scrollTo(active+1);
  if ((e.key===' '||e.key==='Enter') && active>=0) { e.preventDefault(); cards[active].classList.toggle('flipped'); }
  if (e.key==='Escape' && active>=0) cards[active].classList.remove('flipped');
});

requestAnimationFrame(() => scrollTo(0));
</script>
</body>
</html>
